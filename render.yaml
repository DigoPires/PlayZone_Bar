services:
  - type: web
    name: playzone-api
    env: node
    rootDir: artifacts/api-server
    plan: starter
    buildCommand: >-
      corepack enable &&
      corepack prepare pnpm@10.15.0 --activate &&
      pnpm run build:deploy
    startCommand: pnpm --filter @workspace/api-server start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: API_PORT
        value: 10000
