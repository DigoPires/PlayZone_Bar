services:
  - type: web
    name: playzone-api
    env: node
    rootDir: artifacts/api-server
    plan: starter
    buildCommand: >-
      corepack enable &&
      corepack prepare pnpm@10.15.0 --activate &&
      pnpm install --frozen-lockfile &&
      pnpm --filter @workspace/db push &&
      pnpm --filter @workspace/scripts seed &&
      pnpm --filter @workspace/playzone-bar run build &&
      pnpm --filter @workspace/api-server run build
    startCommand: pnpm --filter @workspace/api-server start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: API_PORT
        value: 10000
